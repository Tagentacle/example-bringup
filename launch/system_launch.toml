# Tagentacle Chatbot System Launch Configuration
# Topology: MCP Server + Inference + Memory + Agent + Frontend
# This file defines the system topology: which nodes to launch,
# their startup parameters, and environment credentials.

[daemon]
addr = "127.0.0.1:19999"

# --- Node Definitions (launched in dependency order) ---

[[nodes]]
name = "mcp_server_node"
package = "example_mcp_server"
command = "python server.py"
description = "Weather MCP Server providing tool calls over the bus"

[[nodes]]
name = "inference_node"
package = "example_inference"
command = "python inference.py"
description = "Stateless LLM gateway — proxies to OpenAI-compatible API"

[[nodes]]
name = "memory_node"
package = "example_memory"
command = "python memory.py"
description = "Session persistence — subscribes /memory/latest, saves to disk"

[[nodes]]
name = "agent_node"
package = "example_agent"
command = "python client.py"
description = "Chatbot agent with full agentic loop and MCP tool use"
depends_on = ["mcp_server_node", "inference_node"]
startup_delay = 2

[[nodes]]
name = "frontend_node"
package = "example_frontend"
command = "python frontend.py"
description = "Gradio web UI for chatbot interaction"
depends_on = ["agent_node"]
startup_delay = 1

# --- Parameter Injection ---

[parameters]
TAGENTACLE_DAEMON_URL = "tcp://127.0.0.1:19999"
INFERENCE_MODEL = "moonshotai/kimi-k2.5"

# --- Secrets File ---
# Secrets are loaded from a separate git-ignored file and injected as env vars.
[secrets]
secrets_file = "config/secrets.toml"
