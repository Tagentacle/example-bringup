[package]
name = "example_bringup"
version = "0.1.0"
description = "System bringup package: topology orchestration and parameter injection"
authors = ["Tagentacle Contributors"]
type = "bringup"

[launch]
config = "launch/system_launch.toml"

# --- Workspace Repository Dependencies ---
# When a user clones this bringup pkg into a workspace and runs
# `tagentacle setup dep --all`, the CLI will auto-clone these repos
# into the workspace's src/ directory if they are not already present.

[workspace.repos.tagentacle_py_core]
git = "https://github.com/Tagentacle/tagentacle-py-core.git"

[workspace.repos.tagentacle_py_mcp]
git = "https://github.com/Tagentacle/tagentacle-py-mcp.git"

[workspace.repos.tagentacle_py_tacl]
git = "https://github.com/Tagentacle/tagentacle-py-tacl.git"

[workspace.repos.tagentacle_py_inferencemux]
git = "https://github.com/Tagentacle/tagentacle-py-inferencemux.git"

[workspace.repos.example_agent]
git = "https://github.com/Tagentacle/example-agent.git"

[workspace.repos.mcp_interfaces]
git = "https://github.com/Tagentacle/mcp-interfaces.git"

[workspace.repos.mcp_gateway]
git = "https://github.com/Tagentacle/mcp-gateway.git"

[workspace.repos.example_mcp_server]
git = "https://github.com/Tagentacle/example-mcp-server.git"

[workspace.repos.example_inference]
git = "https://github.com/Tagentacle/example-inference.git"

[workspace.repos.example_memory]
git = "https://github.com/Tagentacle/example-memory.git"

[workspace.repos.example_frontend]
git = "https://github.com/Tagentacle/example-frontend.git"

[workspace.repos.shell_mcp]
git = "https://github.com/Tagentacle/shell-mcp.git"

[workspace.repos.container_orchestrator]
git = "https://github.com/Tagentacle/container-orchestrator.git"

[workspace.repos.mock_external_server]
git = "https://github.com/Tagentacle/mock-external-server.git"

[workspace.repos.bus_connector_mcp]
git = "https://github.com/Tagentacle/bus-connector-mcp.git"
